agents:
  - id: aml-copilot
    name: AML Copilot
    description: Ask your AML Agent anything — routes to the right skill
    version: "2.0.0"
    capabilities: [streaming, api]
    workspace: /copilot
    skills:
      - policy-qa
      - rag-lookup
      - analyst-nl-sql
      - sar-draft

  - id: transaction-monitoring
    name: Transaction Monitoring Agent
    description: KYT scoring, amount thresholds, Travel Rule checks
    version: "1.0.0"
    capabilities: [api, push]
    workspace: /cases
    skills:
      - kyt-score
      - travel-rule-check

  - id: data-analyst
    name: Data Analyst Agent
    description: Natural language to SQL over transaction warehouse
    version: "1.1.0"
    capabilities: [streaming, api]
    workspace: /analyst
    skills:
      - analyst-nl-sql
      - rule-fire-rates

  - id: sanctions-screening
    name: Sanctions Screening Agent
    description: OFAC, PEP, adverse media screening
    version: "1.0.0"
    capabilities: [api]
    workspace: /copilot
    skills:
      - sanctions-check

  - id: graph-analyst
    name: Graph Analyst Agent
    description: On-chain connection analysis and mixer detection
    version: "1.0.0"
    capabilities: [streaming, api]
    workspace: /cases
    skills:
      - graph-summary

  - id: sar-filing
    name: SAR Filing Agent
    description: Draft SAR narratives for escalated cases
    version: "1.0.0"
    capabilities: [streaming, api]
    workspace: /cases
    skills:
      - sar-draft

  - id: osint-search
    name: OSINT Search Agent
    description: Entity research and adverse media (mock sources)
    version: "2.0.0"
    capabilities: [streaming, push, api]
    workspace: /copilot
    skills:
      - osint-research

  - id: business-due-diligence
    name: Business Due Diligence Agent
    description: KYB verification for VASP partners
    version: "1.0.0"
    capabilities: [api]
    workspace: /copilot
    skills:
      - kyb-verify

  - id: rule-assistant
    name: Rule Assistant Agent
    description: Plain-English policy to monitoring rules
    version: "1.0.0"
    capabilities: [streaming, api]
    workspace: /policy
    skills:
      - rule-build
      - rule-fire-rates

skills:
  - id: policy-qa
    name: Policy Q&A
    description: Answer questions from AML policy document
    tools: [policy_reader]

  - id: rag-lookup
    name: RAG Case Lookup
    description: Find similar resolved cases from memory
    tools: [rag_search]

  - id: analyst-nl-sql
    name: NL to SQL
    description: Convert natural language to read-only SQL
    tools: [sql_generator, sql_runner]

  - id: rule-fire-rates
    name: Rule Fire Rates
    description: Compute rule trigger rates from transaction data
    tools: [sql_runner]

  - id: sar-draft
    name: SAR Narrative
    description: Draft SAR filing narrative for escalated alerts
    tools: [llm_writer]

  - id: kyt-score
    name: KYT Analysis
    description: Explain KYT score components for an alert
    tools: [alert_reader]

  - id: travel-rule-check
    name: Travel Rule Check
    description: Validate Travel Rule / IVMS101 status
    tools: [alert_reader]

  - id: sanctions-check
    name: Sanctions Check
    description: Summarize sanctions screening results
    tools: [alert_reader, screen_sanctions]

  - id: graph-summary
    name: Graph Summary
    description: Summarize connection graph risk patterns
    tools: [graph_reader]

  - id: osint-research
    name: OSINT Research
    description: Business and entity research report
    tools: [osint_search]

  - id: kyb-verify
    name: KYB Verification
    description: Partner and merchant due diligence
    tools: [kyb_registry]

  - id: rule-build
    name: Rule Building
    description: Suggest monitoring rules from policy language
    tools: [rules_compile]
